<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Gesture-controlled Particle System</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
    <div id="canvas-container"></div>
    <video class="input_video"
        style="display: block; position: absolute; top: -1000px; left: -1000px; width: 640px; height: 480px; opacity: 0; z-index: -10;"
        autoplay playsinline muted></video>

    <button id="toggleControlsBtn" class="toggle-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
        </svg>
    </button>

    <div class="dashboard hidden" id="dashboard">
        <div class="header">
            <div class="header-title">
                <h2>Antigravity</h2>
                <p class="subtitle">Interactive Core</p>
            </div>
            <button id="closeControlsBtn" class="close-btn">&times;</button>
        </div>

        <div class="control-group switch-group">
            <label for="gestureToggle">Enable AI Gestures</label>
            <label class="switch">
                <input type="checkbox" id="gestureToggle" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="control-group">
            <label for="particleColor">Energy Core Color</label>
            <input type="color" id="particleColor" value="#00d2ff">
        </div>

        <div class="control-group">
            <label for="particleCount">Particle Density</label>
            <input type="range" id="particleCount" min="1000" max="50000" value="15000">
            <span id="particleCountValue">15000</span>
        </div>

        <div class="control-group">
            <label for="gravityStrength">Repulsion Force</label>
            <input type="range" id="gravityStrength" min="1" max="100" value="40">
            <span id="gravityStrengthValue">40</span>
        </div>

        <div class="control-group">
            <label for="bgColor">Void Background</label>
            <input type="color" id="bgColor" value="#030308">
        </div>

        <div class="status" id="statusMsg">Initializing AI Vision...</div>
        <div class="hint">Move mouse or use hand to repel particles</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
